# Optional: if you want Flink pods on dedicated nodes.
# Apply with: kubectl apply -f flink-k8s/flink-nodepool-patch.yaml
#
# Otherwise Flink pods will land on the default Karpenter nodepool.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: flink
spec:
  template:
    metadata:
      labels:
        workload-profile: flink
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["m5.2xlarge", "m5.xlarge", "m6i.2xlarge", "m6i.xlarge"]
      taints:
        - key: workload-profile
          value: flink
          effect: NoSchedule
  limits:
    cpu: "64"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60s
